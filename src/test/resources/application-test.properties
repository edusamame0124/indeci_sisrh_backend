# ============================================================================
# Perfil de test — H2 en memoria para @DataJpaTest (B3).
# MODE=Oracle: H2 emula sintaxis Oracle. INIT crea el schema GESTIONRRHH que
# usan las entities (@Table(schema="GESTIONRRHH")). ddl-auto=create-drop genera
# las tablas desde las anotaciones JPA (no desde los scripts V010_*).
# ============================================================================
spring.datasource.url=jdbc:h2:mem:b3test;DB_CLOSE_DELAY=-1;MODE=Oracle;INIT=CREATE SCHEMA IF NOT EXISTS GESTIONRRHH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
# Dialect H2 EXPLÍCITO obligatorio: con MODE=Oracle en la URL, la auto-detección
# de Hibernate elige mal el dialecto y no genera las tablas. El warning de
# deprecación es inofensivo; sin esta línea los tests fallan (tabla no encontrada).
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
