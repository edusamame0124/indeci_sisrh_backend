# ============================
# APP
# ============================
spring.application.name=indice-backend
server.port=8080

# ============================
# ORACLE DATABASE
# Valores locales en application-dev.properties (gitignoreado).
# Producción: setear INDECI_DB_URL, INDECI_DB_USERNAME, INDECI_DB_PASSWORD.
# ============================
spring.datasource.url=${INDECI_DB_URL}
spring.datasource.username=${INDECI_DB_USERNAME}
spring.datasource.password=${INDECI_DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ============================
# HIKARI CONNECTION POOL
# ============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.validation-timeout=10000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL
# Timeouts JDBC Oracle (red remota 10.x suele tardar >20s en autenticación intermitente).
spring.datasource.hikari.data-source-properties.oracle.net.CONNECT_TIMEOUT=60000
spring.datasource.hikari.data-source-properties.oracle.jdbc.ReadTimeout=120000
# ============================
# JPA / HIBERNATE
# ============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
# Dialecto explícito: obligatorio si JDBC metadata no está disponible (p. ej. timeout al conectar).
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
# Evita connection.getSchema() en arranque (Oracle puede cerrar la sesión → SQLSTATE 08003).
spring.jpa.properties.hibernate.default_schema=GESTIONRRHH
# Batch JDBC de INSERT/UPDATE: agrupa sentencias para reducir round-trips a Oracle.
# ADVERTENCIA: Hibernate DESACTIVA el batch para entidades con @GeneratedValue(IDENTITY),
# porque debe ejecutar cada INSERT al instante para recuperar el ID autogenerado. Casi todas
# las PKs de este esquema son IDENTITY, por lo que esto NO acelera la importación de asistencia
# (INDECI_ASISTENCIA_IMPORTACION_FILA). Beneficia solo operaciones masivas de entidades con
# SEQUENCE o ID asignado. Para batchear la importación hay que migrar su PK a SEQUENCE o usar
# un bulk insert por JDBC (cambios de código).
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

# ============================
# JWT
# ============================
jwt.secret=${INDECI_JWT_SECRET:${GDR_JWT_SECRET}}
jwt.expiration=7200000

# ============================
# OTP / SECURITY
# ============================
cloudflare.turnstile.secret=${TURNSTILE_SECRET}

# ============================
# FRONTEND
# ============================
app.frontend.base-url=http://localhost:4200

# ============================
# SWAGGER
# ============================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.model-and-view-allowed=true

# ============================
# ADMIN ALTA DE USUARIO — rol inicial opcional (no requiere variables de entorno)
# ============================
# Si ambas líneas quedan vacías: se usa un rol ACTIVO de SS_ROL (prioridad menor NIVEL y menor ID_ROL; ACTIVO S o 1).
# Rol en SS_USUARIO_ROL al crear usuario (permisos reales del JWT).
# Opción explícita: indeci.admin.new-user-default-role-id=2 O indeci.admin.new-user-default-role-codigo=RRHH_CONSULTA
indeci.admin.new-user-default-role-id=
indeci.admin.new-user-default-role-codigo=RRHH_CONSULTA
# Columna legacy USERS.ROLE_ID (FK antigua). Debe existir en el catálogo padre de la BD (típico: ADMIN).
indeci.admin.new-user-legacy-role-codigo=ADMIN

# ============================
# MAIL
# ============================
correo.smtp.usuario=${SMTP_USER}
correo.smtp.clave=${SMTP_PASS}
correo.smtp.host=${SMTP_HOST}
correo.smtp.port=${SMTP_PORT}


# FTP institucional INDECI (red interna 10.0.1.0/24).
# Env var tiene prioridad; defaults dev si no están definidas en el OS (sin reiniciar IDE).
# Producción: sobrescribir con INDECI_FTP_* en el servidor. Clave en application-dev.properties.
ftp.host=${INDECI_FTP_HOST:10.0.1.107}
ftp.port=${INDECI_FTP_PORT:21}
ftp.user=${INDECI_FTP_USER:admin}
ftp.password=${INDECI_FTP_PASSWORD:}
ftp.base-path=${INDECI_FTP_BASE_PATH:/SISRRHH/}
# Dev: si INDECI_FTP_USER está vacío, guarda en disco (./data/legajo por defecto).
ftp.local-fallback-enabled=${INDECI_FTP_LOCAL_FALLBACK:true}
ftp.local-base-path=${INDECI_FTP_LOCAL_PATH:./data/legajo}



# ============================
# CORS (frontends INDECI — dev y prod)
# ============================
indeci.cors.allowed-origins=${INDECI_CORS_ALLOWED:http://localhost:4200,http://localhost:4201,http://localhost:4202,http://10.64.24.19:8089,http://10.64.24.19:8088}

# ============================
# LOGGING
# ============================
logging.file.path=/logs
logging.level.root=INFO

# ============================
# ACTUATOR
# ============================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ============================
# MOTOR DE PLANILLA v3 — feature flags
# ============================
# F1.5a (2026-05-31): activa el prorrateo por días del reintegro (PASO 5b).
# Cuando =false, el motor calcula exactamente como antes (sin regresión).
# Cuando =true, lee INDECI_EMPLEADO_REINTEGRO vigente y suma el monto
# prorrateado al total remunerativo del empleado (base afecta a pensión + ESSALUD).
# Activar SÓLO tras smoke en BD real. F1.5b agregará lectura de MONTO_CONTRATO
# y prorrateo de incrementos DS vía flag ES_PRORRATEABLE en INDECI_CONCEPTO_PLANILLA.
motor.v3.prorrateo.enabled=true

# ============================
# BENEFICIOS CAS 2026 (decisión RRHH C6, fase F2bis)
# ============================
# Activa el cálculo de aguinaldos CAS (julio/diciembre) + bonificación
# extraordinaria. Requiere que RRHH haya cargado en INDECI_PARAMETRO_REMUNERATIVO
# los códigos:
#   AGUINALDO_CAS_JULIO      (PEN, vigencia anual)
#   AGUINALDO_CAS_DICIEMBRE  (PEN, vigencia anual)
#   BONIF_EXTRAORD_PCT       (PCT, 0.09 típico, sobre el aguinaldo)
# Si los parámetros no están cargados, el service devuelve montos en 0 sin
# lanzar (defensivo). Cuando MEF publique el DS anual, RRHH carga los valores
# y se activa el flag.
# Bajo flag OFF: BeneficiosCasService.calcular devuelve "no aplica".
feature.beneficios-cas-2026.enabled=false


spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB




