# ============================
# APP
# ============================
spring.application.name=indice-backend
server.port=8080

# ============================
# ORACLE DATABASE (ENV) ALGO
# ============================
#spring.datasource.url=${INDECI_DB_URL}
#spring.datasource.username=${INDECI_DB_USERNAME}
#spring.datasource.password=${INDECI_DB_PASSWORD}

spring.datasource.url=jdbc:oracle:thin:@10.0.1.164:1555:DEVELOPER
spring.datasource.username=GESTIONRRHH
spring.datasource.password=gst6er56

spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ============================
# HIKARI CONNECTION POOL
# ============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.keepalive-time=300000
# ============================
# JPA / HIBERNATE
# ============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# ============================
# JWT
# ============================
jwt.secret=${JWT_SECRET}
jwt.expiration=7200000

# ============================
# OTP / SECURITY
# ============================
cloudflare.turnstile.secret=${TURNSTILE_SECRET}

# ============================
# FRONTEND
# ============================
app.frontend.base-url=http://localhost:4200

# ============================
# SWAGGER
# ============================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.model-and-view-allowed=true

# ============================
# ADMIN ALTA DE USUARIO — rol inicial opcional (no requiere variables de entorno)
# ============================
# Si ambas líneas quedan vacías: se usa un rol ACTIVO de SS_ROL (prioridad menor NIVEL y menor ID_ROL; ACTIVO S o 1).
# Rol en SS_USUARIO_ROL al crear usuario (permisos reales del JWT).
# Opción explícita: indeci.admin.new-user-default-role-id=2 O indeci.admin.new-user-default-role-codigo=RRHH_CONSULTA
indeci.admin.new-user-default-role-id=
indeci.admin.new-user-default-role-codigo=RRHH_CONSULTA
# Columna legacy USERS.ROLE_ID (FK antigua). Debe existir en el catálogo padre de la BD (típico: ADMIN).
indeci.admin.new-user-legacy-role-codigo=ADMIN

# ============================
# MAIL
# ============================
correo.smtp.usuario=${SMTP_USER}
correo.smtp.clave=${SMTP_PASS}
correo.smtp.host=${SMTP_HOST}
correo.smtp.port=${SMTP_PORT}


# FTP institucional INDECI (red interna 10.0.1.0/24).
# F0.5 / 2026-05-31 — credenciales movidas a env vars (LEY-01: no committear secretos).
# Producción debe setear INDECI_FTP_USER + INDECI_FTP_PASSWORD; defaults son solo de dev.
ftp.host=${INDECI_FTP_HOST:10.0.1.107}
ftp.port=${INDECI_FTP_PORT:21}
ftp.user=${INDECI_FTP_USER:}
ftp.password=${INDECI_FTP_PASSWORD:}
ftp.base-path=${INDECI_FTP_BASE_PATH:/SISRRHH/}



# ============================
# LOGGING
# ============================
logging.file.path=/logs
logging.level.root=INFO

# ============================
# ACTUATOR
# ============================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ============================
# MOTOR DE PLANILLA v3 — feature flags
# ============================
# F1.5a (2026-05-31): activa el prorrateo por días del reintegro (PASO 5b).
# Cuando =false, el motor calcula exactamente como antes (sin regresión).
# Cuando =true, lee INDECI_EMPLEADO_REINTEGRO vigente y suma el monto
# prorrateado al total remunerativo del empleado (base afecta a pensión + ESSALUD).
# Activar SÓLO tras smoke en BD real. F1.5b agregará lectura de MONTO_CONTRATO
# y prorrateo de incrementos DS vía flag ES_PRORRATEABLE en INDECI_CONCEPTO_PLANILLA.
motor.v3.prorrateo.enabled=false

# ============================
# BENEFICIOS CAS 2026 (decisión RRHH C6, fase F2bis)
# ============================
# Activa el cálculo de aguinaldos CAS (julio/diciembre) + bonificación
# extraordinaria. Requiere que RRHH haya cargado en INDECI_PARAMETRO_REMUNERATIVO
# los códigos:
#   AGUINALDO_CAS_JULIO      (PEN, vigencia anual)
#   AGUINALDO_CAS_DICIEMBRE  (PEN, vigencia anual)
#   BONIF_EXTRAORD_PCT       (PCT, 0.09 típico, sobre el aguinaldo)
# Si los parámetros no están cargados, el service devuelve montos en 0 sin
# lanzar (defensivo). Cuando MEF publique el DS anual, RRHH carga los valores
# y se activa el flag.
# Bajo flag OFF: BeneficiosCasService.calcular devuelve "no aplica".
feature.beneficios-cas-2026.enabled=false


spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB




